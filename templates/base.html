<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}BurnoutIQ{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    [data-theme="dark"] {
      --bg:        #080B14;
      --bg2:       #0D1020;
      --surface:   #111827;
      --card:      #161D2F;
      --border:    #1E2A42;
      --text:      #E8EDF8;
      --muted:     #64748B;
      --accent:    #6366F1;
      --accent2:   #8B5CF6;
      --ok:        #10B981;
      --warn:      #F59E0B;
      --danger:    #EF4444;
      --nav-bg:    rgba(8,11,20,0.85);
      --shadow:    0 8px 32px rgba(0,0,0,0.5);
      --glow:      rgba(99,102,241,0.15);
    }
    [data-theme="light"] {
      --bg:        #F0F4FF;
      --bg2:       #E8EEFF;
      --surface:   #FFFFFF;
      --card:      #FFFFFF;
      --border:    #DDE3F0;
      --text:      #0F172A;
      --muted:     #64748B;
      --accent:    #6366F1;
      --accent2:   #8B5CF6;
      --ok:        #10B981;
      --warn:      #F59E0B;
      --danger:    #EF4444;
      --nav-bg:    rgba(240,244,255,0.85);
      --shadow:    0 8px 32px rgba(99,102,241,0.1);
      --glow:      rgba(99,102,241,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cabinet Grotesk', sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
      transition: opacity 0.3s;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.12), transparent);
      top: -100px; left: -100px;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.1), transparent);
      bottom: -80px; right: -80px;
    }
    [data-theme="light"] .bg-orb { opacity: 0.5; }

    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.3s, border-color 0.3s;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
      font-family: 'Clash Display', sans-serif;
      font-size: 20px; font-weight: 700; color: var(--text);
    }
    .nav-brand .brand-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: white;
    }
    .nav-brand span { color: var(--accent); }

    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      text-decoration: none; font-size: 14px; font-weight: 500;
      color: var(--muted); transition: all 0.18s;
    }
    .nav-links a:hover { color: var(--text); background: var(--border); }
    .nav-links a.active { color: var(--accent); background: var(--glow); }
    .nav-links a i { font-size: 13px; }

    .theme-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--muted); cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; margin-left: 8px;
    }
    .theme-btn:hover { color: var(--accent); border-color: var(--accent); }

    .page-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      padding: 88px 32px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .page-wrap.narrow { max-width: 520px; }
    .page-wrap.medium { max-width: 780px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }
    .card-sm { padding: 20px; border-radius: 12px; }

    .page-title {
      font-family: 'Clash Display', sans-serif;
      font-size: 28px; font-weight: 700;
      margin-bottom: 6px; line-height: 1.2;
    }
    .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted); margin-bottom: 7px;
    }
    .form-input {
      width: 100%; padding: 11px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 14px; font-family: 'Cabinet Grotesk', sans-serif;
      transition: all 0.18s; outline: none;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    .form-input::placeholder { color: var(--muted); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700;
      font-family: 'Cabinet Grotesk', sans-serif;
      cursor: pointer; transition: all 0.18s; text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; width: 100%;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }

    .badge {
      display: inline-block; padding: 4px 12px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .badge-ok     { background: rgba(16,185,129,.12); color: var(--ok);    border: 1px solid rgba(16,185,129,.2); }
    .badge-warn   { background: rgba(245,158,11,.12); color: var(--warn);  border: 1px solid rgba(245,158,11,.2); }
    .badge-danger { background: rgba(239,68,68,.12);  color: var(--danger);border: 1px solid rgba(239,68,68,.2); }

    .table { width: 100%; border-collapse: collapse; }
    .table th {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted);
      padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left;
    }
    .table td {
      padding: 14px; border-bottom: 1px solid rgba(30,42,66,0.4);
      font-size: 13px; transition: background 0.15s;
    }
    [data-theme="light"] .table td { border-bottom-color: var(--border); }
    .table tr:last-child td { border: none; }
    .table tbody tr:hover td { background: var(--glow); }

    .alert {
      padding: 14px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .alert-danger { background: rgba(239,68,68,.1); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
    .alert-ok     { background: rgba(16,185,129,.1); color: var(--ok);    border: 1px solid rgba(16,185,129,.2); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 640px) {
      .navbar { padding: 0 16px; }
      .page-wrap { padding: 80px 16px 32px; }
      .form-grid { grid-template-columns: 1fr; }
      .nav-links a span { display: none; }
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<nav class="navbar">
  <a href="/" class="nav-brand">
    <div class="brand-icon">🔥</div>
    Burnout<span>IQ</span>
  </a>

  <div class="nav-links">
    {% if session.get('user_id') %}
      <a href="/" class="{% if request.path == '/' %}active{% endif %}">
        <i class="fa-solid fa-brain"></i><span>Predict</span>
      </a>
      <a href="/history" class="{% if request.path == '/history' %}active{% endif %}">
        <i class="fa-solid fa-clock-rotate-left"></i><span>History</span>
      </a>
      <div style="display:flex;align-items:center;gap:8px;padding:7px 14px;
        border-radius:8px;background:var(--glow);border:1px solid rgba(99,102,241,0.2);">
        <i class="fa-solid fa-circle-user" style="color:var(--accent)"></i>
        <span style="font-size:13px;font-weight:700;color:var(--accent)">
          {{ session.get('user_name', '') }}
        </span>
      </div>
      <a href="/logout" style="color:var(--danger)!important;">
        <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
      </a>
    {% else %}
      <a href="/login" class="{% if request.path == '/login' %}active{% endif %}">
        <i class="fa-solid fa-right-to-bracket"></i><span>Login</span>
      </a>
      <a href="/register" class="{% if request.path == '/register' %}active{% endif %}">
        <i class="fa-solid fa-user-plus"></i><span>Register</span>
      </a>
    {% endif %}

    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
      <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>
  </div>
</nav>

{% block content %}{% endblock %}

<script>
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  const saved = localStorage.getItem('burnoutiq-theme') || 'dark';
  html.setAttribute('data-theme', saved);
  updateIcon(saved);

  function toggleTheme() {
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('burnoutiq-theme', next);
    updateIcon(next);
  }

  function updateIcon(theme) {
    if (!icon) return;
    icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
