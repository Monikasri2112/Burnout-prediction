<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Stress Prediction</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe0b2,#ffccbc,#ffe5d9);
    margin:0;
    padding:0;
}

.container{
    width:800px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#e65100;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input{
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#ff7043;
    box-shadow:0 0 5px rgba(255,112,67,0.5);
}

button{
    margin-top:25px;
    width:100%;
    padding:14px;
    background:#ff7043;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#f4511e;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    color:#bf360c;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Stress Prediction</h1>

<form id="stressForm">

<div class="grid">

<input type="number" name="anxiety_level" placeholder="Anxiety Level" required>
<input type="number" name="self_esteem" placeholder="Self Esteem" required>

<input type="number" name="mental_health_history" placeholder="Mental Health History" required>
<input type="number" name="depression" placeholder="Depression" required>

<input type="number" name="headache" placeholder="Headache" required>
<input type="number" name="blood_pressure" placeholder="Blood Pressure" required>

<input type="number" name="sleep_quality" placeholder="Sleep Quality" required>
<input type="number" name="breathing_problem" placeholder="Breathing Problem" required>

<input type="number" name="noise_level" placeholder="Noise Level" required>
<input type="number" name="living_conditions" placeholder="Living Conditions" required>

<input type="number" name="safety" placeholder="Safety" required>
<input type="number" name="basic_needs" placeholder="Basic Needs" required>

<input type="number" name="academic_performance" placeholder="Academic Performance" required>
<input type="number" name="study_load" placeholder="Study Load" required>

<input type="number" name="teacher_student_relationship" placeholder="Teacher Student Relationship" required>
<input type="number" name="future_career_concerns" placeholder="Future Career Concerns" required>

<input type="number" name="social_support" placeholder="Social Support" required>
<input type="number" name="peer_pressure" placeholder="Peer Pressure" required>

<input type="number" name="extracurricular_activities" placeholder="Extracurricular Activities" required>
<input type="number" name="bullying" placeholder="Bullying" required>

</div>

<button type="submit">Predict Stress Level</button>

</form>

<div class="result" id="result"></div>

</div>

<script>

document.getElementById("stressForm").addEventListener("submit", function(e){

    e.preventDefault();

    const formData = new FormData(this);

    fetch("/predict",{
        method:"POST",
        body:formData
    })
    .then(response => response.text())
    .then(data=>{
        document.getElementById("result").innerHTML=data;
    });

});

</script>

</body>
</html>
